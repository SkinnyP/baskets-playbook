name: Build Playbook

# Baut playbook.html/drills.html automatisch neu, sobald sich der Content
# oder der Renderer aendert - damit Editor-Aenderungen an
# data/playbook_content.json ohne lokales Python live gehen, sobald sie
# nach main gepusht werden.

on:
  push:
    branches: [main]
    paths:
      - "data/playbook_content.json"
      - "scripts/build.py"
      - "templates/**"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install jinja2 markupsafe

      - name: Build exports
        run: python scripts/build.py

      - name: Copy exports to repo root
        run: |
          cp exports/playbook.html playbook.html
          cp exports/drills.html drills.html

      - name: Commit and push if changed
        run: |
          git config user.name "playbook-bot"
          git config user.email "actions@users.noreply.github.com"
          git add playbook.html drills.html
          if git diff --cached --quiet; then
            echo "Keine Aenderungen an playbook.html/drills.html."
          else
            git commit -m "Auto-build playbook.html/drills.html [skip ci]"
            git push
          fi
